<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <rect width="880" height="340" rx="14" fill="#0E1116"/>

