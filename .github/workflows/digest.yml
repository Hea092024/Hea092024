name: Generate Git Digest

on:
  schedule:
    - cron: "*/30 * * * *"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Generate digest SVG
        run: |
          mkdir -p dist
          python scripts/digest.py > dist/digest.svg
        env:
          STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
          GITHUB_USER: Hea092024

      - name: Publish to digest branch
        uses: crazy-max/ghaction-github-pages@v3.2.0
        with:
          target_branch: digest
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
